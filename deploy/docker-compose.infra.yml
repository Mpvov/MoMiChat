name: momichat-infra

services:
  db:
    image: postgres:15-alpine
    container_name: momichat_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-momichat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Exposed for native app access on host
    restart: always

  redis:
    image: redis:7-alpine
    container_name: momichat_redis
    ports:
      - "6379:6379" # Exposed for native app access on host
    volumes:
      - redis_data:/data
    restart: always

  chromadb:
    image: chromadb/chroma:latest
    container_name: momichat_chroma
    ports:
      - "8000:8000" # Exposed for native app access on host
    volumes:
      - chroma_data:/chroma/chroma
    restart: always

volumes:
  postgres_data:
  redis_data:
  chroma_data:

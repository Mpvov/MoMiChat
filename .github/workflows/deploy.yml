name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy Files to EC2 via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/MoMiChat"
          rm: true # Clean old files to prevent conflicts

      - name: Deploy with Docker Compose via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/MoMiChat
            
            # Create a simple .env if it doesn't exist (you should populate this manually later)
            if [ ! -f .env ]; then
              cp .env.example .env
            fi
            
            # Pull new images if any and restart updated containers
            docker compose -f deploy/docker-compose.prod.yml up -d --build --remove-orphans
